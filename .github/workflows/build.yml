name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build src/launcher/launcher.csproj -c Release -p:Platform=x64 -p:BaseOutputPath=${{ github.workspace }}/bin/ -p:BaseIntermediateOutputPath=obj/

      - name: Upload build artifacts
        if: success() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ky3launcher-Release
          path: ${{ github.workspace }}/bin/Release/
          retention-days: 7
