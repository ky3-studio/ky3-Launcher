name: Format Check

on:
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore & Build (for source generators)
        run: dotnet build src/launcher/launcher.csproj -c Release -p:Platform=x64 -p:CI=true -p:BaseOutputPath=${{ github.workspace }}/bin/ -p:BaseIntermediateOutputPath=obj/

      - name: Check formatting
        run: dotnet format src/launcher/launcher.csproj --no-restore --exclude src/launcher/Model/Metadata --severity warn --verify-no-changes --verbosity diagnostic
