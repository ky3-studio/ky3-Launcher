syntax = "proto3";

option csharp_namespace = "Snap.Hutao.Service.Game.AdvancedStart.Model";

package snap.hutao.game.advanced_start;

message AdvancedStartDelayedProgramEntryDto {
  string name = 1;
  string path = 2;
  uint32 delay_seconds = 3;
}

message AdvancedStartDelayedProgramsConfiguration {
  repeated AdvancedStartDelayedProgramEntryDto entries = 1;
}
